apiVersion: v1
kind: ServiceAccount
metadata:
  name: node-pinger
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: node-pinger
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: node-pinger
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: node-pinger
subjects:
  - kind: ServiceAccount
    name: node-pinger
    namespace: kube-system
